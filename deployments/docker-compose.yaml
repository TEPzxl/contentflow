services:
  postgres:
    image: postgres:17-alpine
    container_name: contentflow_postgres
    environment:
      POSTGRES_USER: contentflow
      POSTGRES_PASSWORD: contentflow
      POSTGRES_DB: contentflow
    ports:
      - "5432:5432"
    volumes:
      - contentflow_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contentflow -d contentflow"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: contentflow_redis
    ports:
      - "6379:6379"
    volumes: # 本地开发保留方便调试
      - contentflow_redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  contentflow_postgres:
  contentflow_redis:
