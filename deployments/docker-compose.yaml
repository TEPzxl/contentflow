services:
  backend:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    container_name: contentflow_api
    environment:
      CONTENTFLOW_CONFIG: /app/configs/config.docker.yaml
      CONTENTFLOW_APP_MODE: api
      CONTENTFLOW_OBSERVABILITY_SERVICE_NAME: contentflow-api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started

  scheduler:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    container_name: contentflow_scheduler
    environment:
      CONTENTFLOW_CONFIG: /app/configs/config.docker.yaml
      CONTENTFLOW_APP_MODE: scheduler
      CONTENTFLOW_OBSERVABILITY_SERVICE_NAME: contentflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    container_name: contentflow_worker
    environment:
      CONTENTFLOW_CONFIG: /app/configs/config.docker.yaml
      CONTENTFLOW_APP_MODE: worker
      CONTENTFLOW_OBSERVABILITY_SERVICE_NAME: contentflow-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_CONTENTFLOW_API_BASE_URL: http://localhost:8080/api/v1
    container_name: contentflow_frontend
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: contentflow_postgres
    environment:
      POSTGRES_USER: contentflow
      POSTGRES_PASSWORD: contentflow
      POSTGRES_DB: contentflow
    ports:
      - "5432:5432"
    volumes:
      - contentflow_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contentflow -d contentflow"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: contentflow_redis
    ports:
      - "6379:6379"
    volumes: # 本地开发保留方便调试
      - contentflow_redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: contentflow_migrate
    volumes:
      - ../migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://contentflow:contentflow@postgres:5432/contentflow?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  kafka:
    image: bitnami/kafka:3.7
    container_name: contentflow_kafka
    ports:
      - "9092:9094"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - contentflow_kafka:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: contentflow_otel_collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/jaeger:2.3.0
    container_name: contentflow_jaeger
    ports:
      - "16686:16686"
      - "4319:4317"

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: contentflow_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: contentflow_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - contentflow_grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  contentflow_postgres:
  contentflow_redis:
  contentflow_kafka:
  contentflow_grafana:
