apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: contentflow-staging

resources:
  - ../../base

nameSuffix: -staging

images:
  - name: contentflow
    newName: ghcr.io/your-org/contentflow
    newTag: staging
  - name: contentflow-web
    newName: ghcr.io/your-org/contentflow-web
    newTag: staging

patches:
  - target:
      kind: Ingress
      name: contentflow-backend
    patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-staging
      - op: replace
        path: /spec/rules/0/host
        value: api.staging.contentflow.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.staging.contentflow.example.com
  - target:
      kind: Ingress
      name: contentflow-frontend
    patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-staging
      - op: replace
        path: /spec/rules/0/host
        value: staging.contentflow.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: staging.contentflow.example.com
