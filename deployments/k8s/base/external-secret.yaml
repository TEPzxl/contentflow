apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: contentflow-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: contentflow
  target:
    name: contentflow-secret
    creationPolicy: Owner
  data:
    - secretKey: database-password
      remoteRef:
        key: contentflow/database-password
    - secretKey: jwt-secret
      remoteRef:
        key: contentflow/jwt-secret
    - secretKey: ai-settings-encryption-key
      remoteRef:
        key: contentflow/ai-settings-encryption-key
