apiVersion: apps/v1
kind: Deployment
metadata:
  name: contentflow-scheduler
  labels:
    app.kubernetes.io/name: contentflow
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: contentflow
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: contentflow
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: contentflow
      containers:
        - name: scheduler
          image: contentflow:local
          imagePullPolicy: IfNotPresent
          env:
            - name: CONTENTFLOW_CONFIG
              value: /etc/contentflow/config.yaml
            - name: CONTENTFLOW_APP_MODE
              value: scheduler
            - name: CONTENTFLOW_OBSERVABILITY_SERVICE_NAME
              value: contentflow-scheduler
            - name: CONTENTFLOW_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: contentflow-secret
                  key: database-password
            - name: CONTENTFLOW_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: contentflow-secret
                  key: jwt-secret
          volumeMounts:
            - name: config
              mountPath: /etc/contentflow
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: contentflow-config
