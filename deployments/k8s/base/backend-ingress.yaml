apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: contentflow-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 2m
spec:
  ingressClassName: nginx
  rules:
    - host: contentflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: contentflow-backend
                port:
                  name: http
