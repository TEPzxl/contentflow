apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: contentflow-frontend
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/proxy-body-size: 2m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - contentflow.local
      secretName: contentflow-frontend-tls
  rules:
    - host: contentflow.local
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: contentflow-backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: contentflow-frontend
                port:
                  name: http
