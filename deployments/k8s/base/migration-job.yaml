apiVersion: batch/v1
kind: Job
metadata:
  name: contentflow-migrate
  labels:
    app.kubernetes.io/name: contentflow
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: contentflow
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: migrate/migrate:v4.18.3
          args:
            - -path=/migrations
            - -database=postgres://contentflow:$(DATABASE_PASSWORD)@postgres:5432/contentflow?sslmode=disable
            - up
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: contentflow-secret
                  key: database-password
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: migrations
          configMap:
            name: contentflow-migrations
