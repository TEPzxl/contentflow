apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: contentflow

resources:
  - namespace.yaml
  - service-account.yaml
  - configmap.yaml
  - secret.yaml
  - backend-deployment.yaml
  - frontend-deployment.yaml
  - backend-service.yaml
  - frontend-service.yaml
  - backend-ingress.yaml
  - frontend-ingress.yaml
  - backend-hpa.yaml
  - worker-deployment.yaml
  - scheduler-deployment.yaml
  - migration-job.yaml

configMapGenerator:
  - name: contentflow-migrations
    files:
      - 000001_create_initial_tables.up.sql=migrations/000001_create_initial_tables.up.sql
      - 000001_create_initial_tables.down.sql=migrations/000001_create_initial_tables.down.sql
      - 000002_create_kafka_reliability_tables.up.sql=migrations/000002_create_kafka_reliability_tables.up.sql
      - 000002_create_kafka_reliability_tables.down.sql=migrations/000002_create_kafka_reliability_tables.down.sql
      - 000003_create_ai_feature_tables.up.sql=migrations/000003_create_ai_feature_tables.up.sql
      - 000003_create_ai_feature_tables.down.sql=migrations/000003_create_ai_feature_tables.down.sql
      - 000004_create_article_search_index.up.sql=migrations/000004_create_article_search_index.up.sql
      - 000004_create_article_search_index.down.sql=migrations/000004_create_article_search_index.down.sql
      - 000005_add_embedding_lookup_index.up.sql=migrations/000005_add_embedding_lookup_index.up.sql
      - 000005_add_embedding_lookup_index.down.sql=migrations/000005_add_embedding_lookup_index.down.sql

generatorOptions:
  disableNameSuffixHash: true
