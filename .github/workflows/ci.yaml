name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GO_VERSION: "1.25.x"
  TESTCONTAINERS_RYUK_DISABLED: "true"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check Go modules
        run: scripts/ci.sh tidy-check

      - name: Run unit tests
        run: scripts/ci.sh test

      - name: Run go vet
        run: scripts/ci.sh vet

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: ./...

      - name: Validate OpenAPI
        run: scripts/ci.sh openapi

      - name: Check migrations
        run: scripts/ci.sh migrations

      - name: Validate Kubernetes manifests
        run: scripts/ci.sh k8s

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run integration tests
        run: scripts/ci.sh integration

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: scripts/ci.sh docker-build
