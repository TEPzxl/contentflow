app:
  name: contentflow
  env: dev
  mode: all

server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s

log:
  level: debug
  format: json # 控制输出格式: text/ json
  add_source: false # 是否打印源码位置

database:
  host: localhost
  port: 5432
  username: contentflow
  password: contentflow
  dbname: contentflow
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 10

cache:
  source_list_ttl: 30s
  article_list_ttl: 30s

rate_limit:
  login_limit: 5
  login_window: 1m
  collect_limit: 10
  collect_window: 1m

observability:
  metrics_enabled: true
  tracing_enabled: false
  service_name: contentflow
  otlp_endpoint: localhost:4317

kafka:
  enabled: false
  brokers:
    - localhost:9092
  group_id: contentflow-collection-worker
  max_attempts: 3
  retry_backoff: 1m
  outbox_batch_size: 100
  outbox_dispatch_interval: 1s

auth:
  access_token_ttl: 15m
  refresh_token_ttl: 168h
  jwt_secret: dev-only-insecure-jwt-secret-change-me
  jwt_issuer: contentflow

ai:
  provider: local
  base_url: https://api.openai.com/v1
  api_key: ""
  model: ""
  embedding_model: text-embedding-3-small
  timeout: 30s
  settings_encryption_key: ""
