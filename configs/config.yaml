app:
  name: contentflow
  env: dev

server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s

log:
  level: debug
  format: json # 控制输出格式: text/ json
  add_source: false # 是否打印源码位置

database:
  host: localhost
  port: 5432
  username: contentflow
  password: contentflow
  dbname: contentflow
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 10

cache:
  source_list_ttl: 30s
  article_list_ttl: 30s

rate_limit:
  login_limit: 5
  login_window: 1m
  collect_limit: 10
  collect_window: 1m

kafka:
  enabled: false
  brokers:
    - localhost:9092
  group_id: contentflow-collection-worker
  max_attempts: 3

auth:
  access_token_ttl: 15m
  refresh_token_ttl: 168h
  jwt_secret: 3a18d44e399005f0b5f75af6e511372a800157c914a6fb4fcfa5d5473f542c7ed2a09474dd818d4d64c340b57e7f5d7ab251831b3c6ba1cd08667e01c2a0b51c
  jwt_issuer: contentflow
